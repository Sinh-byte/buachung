name: buachung
description: Quản lý nợ chung bạn bè khi đi ăn – Android & iOS
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Database ──────────────────────────────────────────────
  sqflite: ^2.3.3+1          # SQLite cho cả Android & iOS
  path: ^1.9.0
  path_provider: ^2.1.4

  # ── State Management ──────────────────────────────────────
  provider: ^6.1.2

  # ── UI ────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.1   # swipe to delete
  intl: ^0.19.0              # format tiền, ngày tháng

  # ── Camera & Image ────────────────────────────────────────
  image_picker: ^1.1.2       # chọn ảnh từ gallery hoặc chụp
  cached_network_image: ^3.4.1

  # ── Utils ─────────────────────────────────────────────────
  uuid: ^4.4.2
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
